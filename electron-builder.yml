# ============================================================
# ScriptWeaver 1.0 全平台顶配分发配置
#   Win  : nsis（标准安装包） + zip（免安装绿色版）  · x64
#   macOS: dmg + zip                              · universal（Intel + Apple Silicon）
#   Linux: AppImage（免安装通用绿色版）
# 自动更新索引：publish 配置触发 electron-builder 在 release/ 生成
#   latest.yml / latest-mac.yml / latest-linux.yml
# ============================================================
appId: com.scriptweaver.app
productName: ScriptWeaver
directories:
  output: release_build3
  buildResources: assets
asar: true
files:
  - dist/**/*
  - dist-electron/**/*

# Web 导出模板（纯前端播放器）随包进入 resources/web-player，运行时由主进程复制到导出目录
extraResources:
  - from: web-player
    to: web-player

# ---- 自动更新发布源（替换为你的静态托管地址即可启用 OTA） ----
publish:
  provider: generic
  url: https://your-release-host.example.com/scriptweaver/releases/
  # electron-builder 会据此自动产出 latest.yml / latest-mac.yml / latest-linux.yml

# ===================== Windows =====================
win:
  target:
    - nsis
    - zip
  # 不指定 arch：electron-builder 默认按当前构建平台自动输出标准架构（x64）
  # nsis 产出 .exe，zip 产出 .zip，扩展名天然不冲突
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # 高分屏适配：安装向导初始化前标记进程为 DPI 感知，避免 Windows 位图拉伸导致模糊/字体毛边
  include: build/installer.nsh

# ===================== macOS =====================
# 架构不在此处声明：electron-builder 默认按构建平台输出标准架构。
# 若需 universal 单包兼容 Intel + Apple Silicon，应写在 target 内（仅可在 macOS 上构建）：
#   mac:
#     target:
#       - target: dmg
#         arch: universal
#       - target: zip
#         arch: universal
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  artifactName: ${productName}-${version}-${arch}.${ext}

# ===================== Linux =====================
linux:
  target:
    - AppImage
  # 不指定 arch：默认按当前构建平台输出标准架构
  category: Development
  artifactName: ${productName}-${version}.${ext}
