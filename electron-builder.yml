appId: com.scriptweaver.app
productName: ScriptWeaver
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - dist-electron/**/*
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - AppImage
  artifactName: ${productName}-${version}.${ext}
